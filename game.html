<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png"/>
<title>Design Eye | Jay Tulloch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Abril+Fatface&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
      --bg: #FFFFFF; --bg-card: #FFFFFF; --bg-elevated: #F5F5F7;
      --text: #111111; --text-muted: #6B6E74; --text-body: #141414;
      --border: #E8E8EC; --border-strong: #D0D0D0;
      --tag-bg: #EAF0FF; --accent: #0044E4;
      --font: 'Instrument Sans', -apple-system, 'Helvetica Neue', Arial, sans-serif;
      --black: #000000; --white: #FFFFFF;
      --gray-dark: #F5F5F7; --gray-mid: #E0E0E4; --gray-light: #6B6E74;
      --green: #22c55e; --card: #FFFFFF; --radius: 12px; --muted: #6B6E74;
    }
  body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; overflow: hidden; -webkit-font-smoothing: antialiased; }

  .game-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100dvh; padding: 24px; position: relative; }
  .game-header { position: absolute; top: 0; left: 0; right: 0; padding: 24px 32px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
  .game-logo { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .game-back { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  .game-back:hover { color: var(--text); }
  .game-back svg { width: 14px; height: 14px; }
  .game-logo em { font-style: normal; color: var(--accent); }
  .game-round { font-size: 12px; font-weight: 500; letter-spacing: 0.08em; color: var(--text-muted); }
  .game-difficulty { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 10px; border-radius: 4px; background: var(--bg-elevated); color: var(--text-muted); margin-left: 12px; }
  .game-difficulty.hard { background: rgba(230,51,41,0.12); color: var(--accent); }
  .progress-bar { position: absolute; top: 0; left: 0; height: 2px; background: var(--accent); transition: width 0.6s cubic-bezier(0.16,1,0.3,1); }

  .game-prompt { text-align: center; margin-bottom: 36px; opacity: 0; transform: translateY(12px); animation: fadeUp 0.5s ease 0.1s forwards; }
  .game-prompt h2 { font-size: clamp(18px, 3vw, 24px); font-weight: 700; margin-bottom: 6px; letter-spacing: -0.02em; }
  .game-prompt p { font-size: 13px; color: var(--text-body); }

  .game-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 820px; width: 100%; opacity: 0; transform: translateY(16px); animation: fadeUp 0.5s ease 0.2s forwards; }
  @media (max-width: 600px) { .game-cards { grid-template-columns: 1fr; max-width: 400px; } }

  .game-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; position: relative; transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease; }
  .game-card:hover { transform: translateY(-3px); border-color: var(--border-strong); box-shadow: 0 12px 32px rgba(0,0,0,0.08); }
  .game-card.disabled { pointer-events: none; }
  .game-card .card-label { position: absolute; top: 12px; left: 12px; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; background: rgba(255,255,255,0.88); backdrop-filter: blur(8px); padding: 4px 10px; border-radius: 6px; color: var(--text); border: 1px solid var(--border); z-index: 2; }
  .card-ui { width: 100%; aspect-ratio: 4/3; position: relative; overflow: hidden; }
  .game-card.correct { border-color: var(--green); box-shadow: 0 0 30px rgba(34,197,94,0.15); }
  .game-card.correct .card-label { background: var(--green); color: #fff; }
  .game-card.wrong { border-color: var(--accent); opacity: 0.5; }
  .game-card.wrong .card-label { background: var(--accent); color: #fff; }

  .card-feedback { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 16px; background: rgba(255,255,255,0.96); backdrop-filter: blur(8px); border-top: 1px solid var(--border); font-size: 12px; color: var(--text-body); line-height: 1.5; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.16,1,0.3,1); z-index: 3; }
  .game-card.correct .card-feedback, .game-card.wrong .card-feedback { transform: translateY(0); }
  .card-feedback strong { color: var(--accent); }

  .game-score { position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 10; }
  .score-dot { width: 10px; height: 10px; border-radius: 50%; background: #D0D0D0; transition: background 0.3s, transform 0.3s; }
  .score-dot.hit { background: var(--accent); transform: scale(1.4); }
  .score-dot.miss { background: var(--text-muted); transform: scale(1.4); }

  /* Results */
  .results { display: none; flex-direction: column; align-items: center; text-align: center; gap: 16px; opacity: 0; transform: translateY(20px); }
  .results.show { display: flex; animation: fadeUp 0.6s ease forwards; }
  .results-score { font-size: clamp(48px, 10vw, 72px); font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .results-score em { font-style: normal; color: var(--accent); }
  .results-label { font-size: 14px; color: var(--text-muted); max-width: 380px; line-height: 1.6; }
  .results-unlock { font-size: 12px; color: var(--accent); margin-top: 2px; font-weight: 500; opacity: 0; animation: fadeUp 0.4s ease 0.3s forwards; }
  .results-unlock.locked { color: var(--text-muted); }
  .results-cta { display: inline-flex; align-items: center; gap: 8px; margin-top: 12px; padding: 14px 32px; border-radius: 40px; background: var(--text); color: var(--bg); font-size: 14px; font-weight: 600; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; border: none; }
  .results-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,255,255,0.15); }
  .results-cta svg { width: 16px; height: 16px; }
  .results-cta.locked { background: var(--bg-elevated); color: var(--text-muted); border: 1px solid var(--border); }
  .results-replay { font-size: 12px; color: var(--text-muted); cursor: pointer; border: none; background: none; text-decoration: underline; text-underline-offset: 3px; margin-top: 4px; transition: color 0.2s; }
  .results-replay:hover { color: var(--accent); }
  .results-pwd-link { font-size: 11px; color: var(--text-muted); cursor: pointer; border: none; background: none; margin-top: 8px; transition: color 0.2s; text-decoration: none; }
  .results-pwd-link:hover { color: var(--text); }

  .results-pwd-section { display: none; margin-top: 12px; flex-direction: column; align-items: center; gap: 10px; opacity: 0; animation: fadeUp 0.4s ease forwards; }
  .results-pwd-section.show { display: flex; }
  .results-pwd-input { width: 240px; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-elevated); color: var(--text); font-size: 13px; font-family: inherit; text-align: center; outline: none; transition: border-color 0.2s; }
  .results-pwd-input:focus { border-color: var(--accent); }
  .results-pwd-input::placeholder { color: var(--text-muted); }
  .results-pwd-submit { padding: 10px 24px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s, color 0.2s; }
  .results-pwd-submit:hover { background: #0033CC; color: #fff; }
  .results-pwd-error { font-size: 11px; color: var(--accent); display: none; }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .countdown-track { width: 100%; max-width: 820px; height: 2px; background: var(--border); border-radius: 2px; margin-top: 16px; overflow: hidden; opacity: 0; transition: opacity 0.2s; }
  .countdown-track.visible { opacity: 1; }
  .countdown-fill { height: 100%; width: 100%; background: var(--accent); border-radius: 2px; transform-origin: left center; opacity: 0.3; }
  @keyframes drain { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  .countdown-fill.draining { animation: drain 10s linear forwards; }

  .att-badge { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; color: var(--text-muted); transition: color 0.3s; margin-right: 4px; }
  .att-badge.warn { color: var(--accent); }

  @media (max-width: 600px) {
    body { overflow: auto; }
    .game-header { position: relative; padding: 20px 20px 0; }
    .game-difficulty { display: none; }
    .att-badge { display: none; }
    .game-wrap { justify-content: flex-start; padding: 0 16px 32px; min-height: 100dvh; }
    .game-prompt { margin-top: 28px; margin-bottom: 24px; }
    .game-prompt h2 { font-size: 18px; }
    .game-score { position: relative; bottom: auto; left: auto; transform: none; margin-top: 24px; justify-content: center; }
    .results { padding-top: 40px; }
  }

  .lockout-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100dvh; padding: 24px; text-align: center; gap: 14px; }
  .lockout-icon { font-size: 44px; margin-bottom: 4px; }
  .lockout-title { font-size: clamp(22px, 5vw, 30px); font-weight: 800; letter-spacing: -0.025em; }
  .lockout-sub { font-size: 14px; color: var(--text-muted); }
  .lockout-sub span { color: var(--accent); font-weight: 700; font-variant-numeric: tabular-nums; }
  .lockout-note { font-size: 12px; color: var(--text-muted); margin-top: 4px; }


    /* ─── Playfair Display callout accent ──────────────────────────── */
    h1 em, h2 em {
      font-family: 'Abril Fatface', Georgia, serif;
      font-weight: 400;
      font-style: normal;
      font-size: 1em;
      letter-spacing: 0;
    }
    .pod-stat-value em {
      font-family: var(--font);
      font-weight: inherit;
      font-style: normal;
      letter-spacing: inherit;
    }
    </style>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>

<div class="game-wrap" id="game-wrap">
  <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  <div class="game-header">
    <div style="display:flex;align-items:center;gap:20px">
      <a class="game-back" id="game-back" href="./">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back
      </a>
      <div class="game-logo">Design <em>Eye</em></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="att-badge" id="att-badge"></div>
      <div class="game-round" id="game-round">01 / 04</div>
      <div class="game-difficulty" id="game-diff">Think before you click</div>
    </div>
  </div>
  <div class="game-prompt" id="game-prompt">
    <h2 id="prompt-title"></h2>
    <p id="prompt-sub"></p>
  </div>
  <div class="game-cards" id="game-cards"></div>
  <div class="countdown-track" id="countdown-track"><div class="countdown-fill" id="countdown-fill"></div></div>
  <div class="game-score" id="game-score"></div>
  <div class="results" id="results">
    <div class="results-score" id="results-score"></div>
    <p class="results-label" id="results-label"></p>
    <p class="results-unlock" id="results-unlock"></p>
    <a class="results-cta" href="./" id="results-cta">
      View case studies
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
    <button class="results-replay" id="replay-btn">Run it back</button>
    <button class="results-pwd-link" id="pwd-link">or just enter the password</button>
    <div class="results-pwd-section" id="results-pwd-section">
      <input type="password" class="results-pwd-input" id="results-pwd-input" placeholder="Enter password" autocomplete="off"/>
      <button class="results-pwd-submit" id="results-pwd-submit">Unlock</button>
      <p class="results-pwd-error" id="results-pwd-error">Wrong password. Try again.</p>
    </div>
  </div>
</div>

<!-- Lockout screen -->
<div class="lockout-screen" id="lockout-screen">
  <p class="lockout-icon">🔒</p>
  <h2 class="lockout-title">You've used both attempts.</h2>
  <p class="lockout-sub">Come back in <span id="lock-timer">1:00:00</span></p>
  <p class="lockout-note">If you have the password, you can still get in.</p>
  <button class="results-pwd-link" id="lp-link">Enter password</button>
  <div class="results-pwd-section" id="lp-section">
    <input type="password" class="results-pwd-input" id="lp-input" placeholder="Enter password" autocomplete="off"/>
    <button class="results-pwd-submit" id="lp-submit">Unlock</button>
    <p class="results-pwd-error" id="lp-error">Wrong password. Try again.</p>
  </div>
</div>

<script>
(function() {
  // Attempt tracking & lockout
  var ATT_KEY  = 'jt_de_att';
  var LOCK_KEY = 'jt_de_lock';
  var MAX_ATT  = 2;
  var LOCK_MS  = 3600000;
  function getAttempts()  { return parseInt(localStorage.getItem(ATT_KEY)  || '0'); }
  function getLockUntil() { return parseInt(localStorage.getItem(LOCK_KEY) || '0'); }
  function isLockedOut()  { return Date.now() < getLockUntil(); }
  function attemptsLeft() { return Math.max(0, MAX_ATT - getAttempts()); }
  function recordFail() {
    var a = getAttempts() + 1;
    localStorage.setItem(ATT_KEY, String(a));
    if (a >= MAX_ATT) localStorage.setItem(LOCK_KEY, String(Date.now() + LOCK_MS));
  }

  var params   = new URLSearchParams(window.location.search);
  var returnTo = params.get('return') || './';
  var backEl = document.getElementById('game-back');

  function showLockout() {
    var gw = document.getElementById('game-wrap');
    var ls = document.getElementById('lockout-screen');
    if (gw) gw.style.display = 'none';
    if (ls) ls.style.display = 'flex';
    startCountdown();
    var lpl = document.getElementById('lp-link');
    var lps = document.getElementById('lp-section');
    var lpi = document.getElementById('lp-input');
    var lpb = document.getElementById('lp-submit');
    var lpe = document.getElementById('lp-error');
    if (lpl) lpl.addEventListener('click', function() { lpl.style.display='none'; lps.classList.add('show'); if(lpi) lpi.focus(); });
    function checkLockPwd() {
      var val = (lpi ? lpi.value : '').replace(/\s/g,'').toUpperCase();
      if (val === 'OPENSAYSME') { sessionStorage.setItem('jt_cs_unlocked','1'); window.location.href = (returnTo && returnTo !== './') ? returnTo : './#work'; }
      else { if(lpe) lpe.style.display='block'; if(lpi){ lpi.style.borderColor='var(--accent)'; setTimeout(function(){ lpi.style.borderColor=''; },1500); } }
    }
    if (lpb) lpb.addEventListener('click', checkLockPwd);
    if (lpi) lpi.addEventListener('keydown', function(e){ if(e.key==='Enter') checkLockPwd(); });
  }

  function startCountdown() {
    var t = document.getElementById('lock-timer');
    function tick() {
      var rem = getLockUntil() - Date.now();
      if (rem <= 0) { localStorage.removeItem(ATT_KEY); localStorage.removeItem(LOCK_KEY); window.location.reload(); return; }
      var h = Math.floor(rem/3600000);
      var m = Math.floor((rem%3600000)/60000);
      var s = Math.floor((rem%60000)/1000);
      if (t) t.textContent = h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    }
    tick(); setInterval(tick, 1000);
  }

  if (isLockedOut()) { showLockout(); return; }

  function pick(a) { return a[Math.floor(Math.random()*a.length)]; }
  function randInt(lo,hi) { return Math.floor(Math.random()*(hi-lo+1))+lo; }
  function shuffle(a) { var b=a.slice(); for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;} return b; }

  var ac = pick(['#0044E4','#3b82f6','#8b5cf6','#f59e0b','#06b6d4']);
  var headings = ['Account Settings','Project Overview','Payment Details','User Profile','Dashboard','Team Settings','Order Summary','Billing Info','Notification Preferences','Active Subscriptions'];
  var bodies   = ['Manage your preferences and keep things current.','Review the details before confirming.','Important settings live here, handle with care.','Double-check everything before you proceed.','Keep your details current for the best experience.'];
  var btnP = ['Subscribe Now','Continue','Confirm','Save Changes','Get Started','Complete Setup','Activate'];
  var btnS = ['Maybe Later','Cancel','Go Back','Skip','Not Now','Discard'];
  var tagPool = ['Design','Strategy','Research','Engineering','Product','Growth','Mobile','Platform','Finance','Analytics'];
  var difficulties = ['Think before you click','Getting interesting','Professionals only','If you know, you know'];

  // TIER 1
  function r1_typeHierarchy() {
    var title = pick(headings);
    var meta  = pick(['7 members · Updated 2h ago','Draft · Last edited today','In progress · Due Friday','Shared with 4 people','Active · Since March 2024']);
    var body  = pick(bodies);
    return {
      title: 'Which has the stronger type hierarchy?',
      sub: 'Same content. Same font. Only one has the correct size contrast.',
      feedback: 'A 2:1 size ratio between heading and body creates instant reading order. The eye lands without thinking.',
      wrongFeedback: 'Near-identical sizes collapse hierarchy. Users scan to find the title instead of reading, that friction is your UX debt.',
      renderGood: function(el) {
        el.innerHTML = '<div style="width:100%;height:100%;padding:22px;display:flex;flex-direction:column;justify-content:center;gap:4px;background:#F5F5F7">'+
          '<div style="font-size:20px;font-weight:700;color:#111111;letter-spacing:-0.025em;line-height:1.2;margin-bottom:2px">'+title+'</div>'+
          '<div style="font-size:10px;font-weight:500;color:#6B6E74;margin-bottom:8px">'+meta+'</div>'+
          '<div style="font-size:11px;color:#111111;line-height:1.65">'+body+'</div></div>';
      },
      renderBad: function(el) {
        el.innerHTML = '<div style="width:100%;height:100%;padding:22px;display:flex;flex-direction:column;justify-content:center;gap:4px;background:#F5F5F7">'+
          '<div style="font-size:14px;font-weight:700;color:#111111;letter-spacing:-0.01em;line-height:1.3;margin-bottom:3px">'+title+'</div>'+
          '<div style="font-size:11px;font-weight:400;color:#6B6E74;margin-bottom:7px">'+meta+'</div>'+
          '<div style="font-size:12px;color:#111111;line-height:1.55">'+body+'</div></div>';
      }
    };
  }

  function r1_buttonIntent() {
    var action = pick(['Save changes','Confirm payment','Submit request','Complete setup','Activate card']);
    var cancel = pick(['Discard','Cancel','Not now','Go back']);
    var desc   = pick(['Review your changes before saving.','This action cannot be undone.','Check the details below.','You are about to confirm this.']);
    return {
      title: 'Which button layout has clearer intent?',
      sub: 'Same two actions. Which layout makes the hierarchy obvious?',
      feedback: 'Filled full-width primary above, ghost secondary below. One clear target, that is the whole job of CTA hierarchy.',
      wrongFeedback: 'Equal-weight buttons side-by-side force a choice before the user even reads. That hesitation is designed in.',
      renderGood: function(el) {
        el.innerHTML = '<div style="width:100%;height:100%;padding:24px;display:flex;flex-direction:column;justify-content:center;gap:10px;background:#F5F5F7">'+
          '<div style="font-size:15px;font-weight:700;color:#111111;letter-spacing:-0.02em;text-align:center;margin-bottom:4px">'+action.split(' ')[0]+'</div>'+
          '<div style="font-size:11px;color:#111111;text-align:center;line-height:1.6;margin-bottom:6px">'+desc+'</div>'+
          '<div style="width:100%;padding:12px 0;border-radius:10px;background:#fff;color:#111111;font-size:12px;font-weight:700;text-align:center">'+action+'</div>'+
          '<div style="width:100%;padding:10px 0;border-radius:10px;border:1px solid #D0D0D0;color:#3A3A3F;font-size:12px;font-weight:600;text-align:center">'+cancel+'</div></div>';
      },
      renderBad: function(el) {
        el.innerHTML = '<div style="width:100%;height:100%;padding:24px;display:flex;flex-direction:column;justify-content:center;gap:10px;background:#F5F5F7">'+
          '<div style="font-size:15px;font-weight:700;color:#111111;letter-spacing:-0.02em;text-align:center;margin-bottom:4px">'+action.split(' ')[0]+'</div>'+
          '<div style="font-size:11px;color:#111111;text-align:center;line-height:1.6;margin-bottom:6px">'+desc+'</div>'+
          '<div style="display:flex;gap:10px">'+
          '<div style="flex:1;padding:12px 0;border-radius:10px;background:#fff;color:#111111;font-size:11px;font-weight:700;text-align:center">'+action+'</div>'+
          '<div style="flex:1;padding:12px 0;border-radius:10px;background:#fff;color:#111111;font-size:11px;font-weight:700;text-align:center">'+cancel+'</div>'+
          '</div></div>';
      }
    };
  }

  // TIER 2
  function r2_primaryActionSide() {
    var items = [
      { title:'Confirm deletion', body:'This file will be removed permanently and cannot be recovered.', confirm:'Delete', decline:'Cancel' },
      { title:'Discard changes', body:'Your unsaved edits will be lost. This cannot be undone.', confirm:'Discard', decline:'Keep editing' },
      { title:'Log out everywhere', body:'You will be signed out of all active sessions immediately.', confirm:'Log out', decline:'Stay signed in' },
      { title:'Submit for review', body:'Once submitted you will not be able to make further changes.', confirm:'Submit', decline:'Go back' }
    ];
    var it = pick(items);
    return {
      title: 'Which dialog places actions correctly?',
      sub: 'Platform conventions, not aesthetics, decide this one.',
      feedback: 'Primary right-aligned, iOS, Material, macOS, and Windows all agree. The eye arrives at confirm last, after processing the consequence.',
      wrongFeedback: 'Primary on the left reverses the scan. Users reach for cancel and hit confirm, that is how accidental deletes get written up as support tickets.',
      renderGood: function(el) {
        el.innerHTML = '<div style="width:100%;height:100%;padding:20px;display:flex;align-items:center;justify-content:center;background:#F5F5F7">'+
          '<div style="background:#FFFFFF;border-radius:14px;padding:20px;width:100%;border:1px solid #E8E8EC;box-shadow:0 4px 16px rgba(0,0,0,0.06)">'+
          '<div style="font-size:13px;font-weight:700;color:#111111;margin-bottom:6px">'+it.title+'</div>'+
          '<div style="font-size:10px;color:#111111;line-height:1.6;margin-bottom:16px">'+it.body+'</div>'+
          '<div style="display:flex;justify-content:flex-end;gap:8px;align-items:center">'+
          '<div style="padding:7px 14px;border-radius:8px;border:1px solid #D0D0D0;color:#3A3A3F;font-size:10px;font-weight:700">'+it.decline+'</div>'+
          '<div style="padding:7px 16px;border-radius:8px;background:#0044E4;color:#111111;font-size:10px;font-weight:700">'+it.confirm+'</div>'+
          '</div></div></div>';
      },
      renderBad: function(el) {
        el.innerHTML = '<div style="width:100%;height:100%;padding:20px;display:flex;align-items:center;justify-content:center;background:#F5F5F7">'+
          '<div style="background:#FFFFFF;border-radius:14px;padding:20px;width:100%;border:1px solid #E8E8EC;box-shadow:0 4px 16px rgba(0,0,0,0.06)">'+
          '<div style="font-size:13px;font-weight:700;color:#111111;margin-bottom:6px">'+it.title+'</div>'+
          '<div style="font-size:10px;color:#111111;line-height:1.6;margin-bottom:16px">'+it.body+'</div>'+
          '<div style="display:flex;justify-content:flex-start;gap:8px;align-items:center">'+
          '<div style="padding:7px 16px;border-radius:8px;background:#0044E4;color:#111111;font-size:10px;font-weight:700">'+it.confirm+'</div>'+
          '<div style="padding:7px 14px;border-radius:8px;border:1px solid #D0D0D0;color:#3A3A3F;font-size:10px;font-weight:700">'+it.decline+'</div>'+
          '</div></div></div>';
      }
    };
  }

  function r2_lineLength() {
    var h = pick(headings);
    var bLong = 'Review your details carefully before proceeding. Once confirmed, this action will be applied to your account immediately. Changes cannot be reversed without contacting our support team, so make sure everything looks right before you continue.';
    var bShort = 'Review your details. This cannot be undone.';
    return {
      title: 'Which paragraph is set correctly?',
      sub: 'Same context. Different treatment. Not all body copy should be cut short.',
      feedback: 'Body copy earns its length when it reduces uncertainty. Full context, clear consequence, controlled measure — this paragraph is doing its job.',
      wrongFeedback: 'Truncated microcopy creates doubt at a high-stakes moment. Brevity is not always clarity — at a point of no return, the user needed more, not less.',
      renderGood: function(el) {
        el.innerHTML = '<div style="width:100%;height:100%;padding:22px 24px;display:flex;flex-direction:column;justify-content:center;gap:10px;background:#F5F5F7">'+
          '<div style="font-size:15px;font-weight:700;color:#111111;letter-spacing:-0.02em">'+h+'</div>'+
          '<div style="font-size:11px;color:#111111;line-height:1.7;max-width:72%">'+bLong+'</div></div>';
      },
      renderBad: function(el) {
        el.innerHTML = '<div style="width:100%;height:100%;padding:22px 24px;display:flex;flex-direction:column;justify-content:center;gap:10px;background:#F5F5F7">'+
          '<div style="font-size:15px;font-weight:700;color:#111111;letter-spacing:-0.02em">'+h+'</div>'+
          '<div style="font-size:11px;color:#111111;line-height:1.7;max-width:72%">'+bShort+'</div></div>';
      }
    };
  }

  // TIER 3
  function r3_loadingPattern() {
    function mkSkel() {
      var rows = [0,1,2].map(function(){
        return '<div style="background:#FFFFFF;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:10px;border:1px solid #E8E8EC">'+
          '<div style="width:32px;height:32px;border-radius:50%;background:var(--border);flex-shrink:0"></div>'+
          '<div style="flex:1;display:flex;flex-direction:column;gap:6px">'+
          '<div style="height:8px;border-radius:4px;background:#EBEBEF;width:'+randInt(55,75)+'%"></div>'+
          '<div style="height:8px;border-radius:4px;background:#F5F5F7;width:'+randInt(35,50)+'%"></div>'+
          '</div></div>';
      }).join('');
      return '<div style="width:100%;height:100%;padding:16px;display:flex;flex-direction:column;gap:10px;justify-content:center">'+rows+'</div>';
    }
    function mkSpin() {
      var rows = [0,1,2].map(function(){
        return '<div style="background:#FFFFFF;border-radius:8px;display:flex;align-items:center;justify-content:center;height:58px;border:1px solid #E8E8EC">'+
          '<div style="width:16px;height:16px;border-radius:50%;border:2px solid var(--border);border-top-color:rgba(255,255,255,0.4)"></div></div>';
      }).join('');
      return '<div style="width:100%;height:100%;padding:16px;display:flex;flex-direction:column;gap:10px;justify-content:center">'+rows+'</div>';
    }
    return {
      title: 'Which loading state is right for a content list?',
      sub: 'Content is loading. Both are valid patterns. Only one is correct for this context.',
      feedback: 'Skeletons mirror the incoming layout, reducing perceived wait and preventing shift. Spinners are for actions; skeletons are for content.',
      wrongFeedback: 'Spinners in content rows tell users nothing about what is coming. The layout collapses to identical circles, a clear pattern mismatch.',
      renderGood: function(el) { el.innerHTML = mkSkel(); },
      renderBad: function(el) { el.innerHTML = mkSpin(); }
    };
  }

  function r3_emptyState() {
    var noun  = pick(['project','transaction','message','document','notification']);
    var icon  = pick(['◎','□','△','◉']);
    var cta   = 'New ' + noun;
    var why   = noun==='transaction' ? 'Transactions appear here once you start using your account.' : noun==='notification' ? 'You are all caught up. New notifications will appear here.' : 'Create your first '+noun+' to get started.';
    return {
      title: 'Which empty state is better designed?',
      sub: 'Nothing to show. How you handle zero is as important as how you handle a thousand.',
      feedback: 'Icon + headline + explanation + CTA. The user knows what is empty, why, and what to do. Empty states are the most underrated touchpoint in any product.',
      wrongFeedback: 'A label and button with no context. Tells them what is missing but not why, skipping the detail that actually drives action.',
      renderGood: function(el) {
        el.innerHTML = '<div style="width:100%;height:100%;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;background:#F5F5F7">'+
          '<div style="width:40px;height:40px;border-radius:12px;background:#F5F5F7;border:1px solid #E8E8EC;display:flex;align-items:center;justify-content:center;font-size:16px;color:#4A4A52;margin-bottom:4px">'+icon+'</div>'+
          '<div style="font-size:14px;font-weight:700;color:#111111">No '+noun+'s yet</div>'+
          '<div style="font-size:11px;color:#111111;line-height:1.65;max-width:75%">'+why+'</div>'+
          '<div style="margin-top:8px;padding:8px 18px;border-radius:8px;background:#E0E0E4;color:#111111;font-size:11px;font-weight:600">'+cta+'</div></div>';
      },
      renderBad: function(el) {
        el.innerHTML = '<div style="width:100%;height:100%;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;background:#F5F5F7">'+
          '<div style="font-size:12px;color:#111111">No '+noun+'s to display</div>'+
          '<div style="padding:8px 18px;border-radius:8px;background:#E0E0E4;color:#111111;font-size:11px;font-weight:600">'+cta+'</div></div>';
      }
    };
  }

  // TIER 4
  function r4_shadowSystem() {
    function mkC(shadow, bg, w) {
      return '<div style="background:'+bg+';border-radius:10px;padding:14px 16px;box-shadow:'+shadow+';border:1px solid #E8E8EC;width:'+w+'%;margin:0 auto">'+
        '<div style="height:8px;border-radius:4px;background:#D8D8DC;width:55%;margin-bottom:6px"></div>'+
        '<div style="height:8px;border-radius:4px;background:#F5F5F7;width:38%"></div></div>';
    }
    return {
      title: 'Which uses elevation correctly?',
      sub: 'Three surfaces. One uses a consistent shadow scale. The other is guesswork.',
      feedback: 'Elevation in steps, ambient, interactive, float. Each proportional. Depth that reads without being decorative.',
      wrongFeedback: 'No consistent scale, one hard, one faint, one oversized. Fine individually, broken as a system. Depth without logic is just noise.',
      renderGood: function(el) {
        el.innerHTML = '<div style="width:100%;height:100%;padding:18px;display:flex;flex-direction:column;gap:8px;justify-content:center;background:#F5F5F7">'+
          mkC('0 1px 3px rgba(0,0,0,0.35)','#171717',100)+
          mkC('0 4px 12px rgba(0,0,0,0.45)','#1d1d1d',92)+
          mkC('0 12px 32px rgba(0,0,0,0.65)','#232323',84)+'</div>';
      },
      renderBad: function(el) {
        el.innerHTML = '<div style="width:100%;height:100%;padding:18px;display:flex;flex-direction:column;gap:8px;justify-content:center;background:#F5F5F7">'+
          mkC('0 6px 8px rgba(0,0,0,0.55)','#1d1d1d',100)+
          mkC('0 1px 2px rgba(0,0,0,0.9)','#171717',92)+
          mkC('0 8px 20px rgba(0,0,0,0.2)','#1a1a1a',84)+'</div>';
      }
    };
  }

  function r4_colorTemperature() {
    var h = pick(headings), b = pick(bodies), p = pick(btnP);
    return {
      title: 'Which palette reads more considered?',
      sub: 'Nearly identical layouts. The difference is in the grey temperature. Trust your eye.',
      feedback: 'Warm-tinted neutrals carry a fractional amber undertone the brain reads as intentionality. It is why luxury dark-mode products feel crafted, not defaulted.',
      wrongFeedback: 'Cool greys read as default dark mode, not designed. Warm greys are invisible to most users and obvious to every pro.',
      renderGood: function(el) {
        el.innerHTML = '<div style="width:100%;height:100%;padding:22px;display:flex;flex-direction:column;justify-content:center;gap:10px;background:#FAF9F7">'+
          '<div style="font-size:17px;font-weight:700;color:#1A1614;letter-spacing:-0.02em;line-height:1.25">'+h+'</div>'+
          '<div style="font-size:11px;color:#5C504A;line-height:1.65">'+b+'</div>'+
          '<div style="margin-top:4px;padding:10px 18px;border-radius:8px;background:#EDE8E3;border:1px solid rgba(255,245,235,0.08);color:#4A3E38;font-size:11px;font-weight:600;display:inline-block;width:fit-content">'+p+'</div></div>';
      },
      renderBad: function(el) {
        el.innerHTML = '<div style="width:100%;height:100%;padding:22px;display:flex;flex-direction:column;justify-content:center;gap:10px;background:#F8F8FA">'+
          '<div style="font-size:17px;font-weight:700;color:#111111;letter-spacing:-0.02em;line-height:1.25">'+h+'</div>'+
          '<div style="font-size:11px;color:#555559;line-height:1.65">'+b+'</div>'+
          '<div style="margin-top:4px;padding:10px 18px;border-radius:8px;background:#EDEDF1;border:1px solid #E8E8EC;color:#767676;font-size:11px;font-weight:600;display:inline-block;width:fit-content">'+p+'</div></div>';
      }
    };
  }

  function r4_microCopy() {
    var variants = [
      { ctx:'Account Settings', good:'Save changes',     bad:'Submit',            fb:'"Save changes" tells the user exactly what happens. "Submit" is backend language, never make users translate your API calls.' },
      { ctx:'Payment',          good:'Complete purchase', bad:'Continue',          fb:'"Complete purchase" signals money is moving. "Continue" is vague, in payment flows, weak copy kills conversion and trust at the same time.' },
      { ctx:'Delete Account',   good:'Delete my account', bad:'Confirm',           fb:'"Delete my account" forces the user to read the consequence. "Confirm" is passive, tapped without registering. High stakes need specific language.' }
    ];
    var v = pick(variants);
    return {
      title: 'Which button copy is correct?',
      sub: 'Context: ' + v.ctx + '. One label is precise. The other is lazy.',
      feedback: v.fb,
      wrongFeedback: v.fb,
      renderGood: function(el) {
        el.innerHTML = '<div style="width:100%;height:100%;padding:20px;display:flex;flex-direction:column;justify-content:center;gap:10px;background:#F5F5F7">'+
          '<div style="font-size:11px;font-weight:700;color:#3A3A3F;text-align:center;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px">'+v.ctx+'</div>'+
          '<div style="display:flex;flex-direction:column;gap:6px;padding:12px 14px;background:#FFFFFF;border-radius:10px;border:1px solid #E8E8EC;margin-bottom:6px">'+
          '<div style="height:8px;border-radius:4px;background:#EBEBEF;width:80%"></div>'+
          '<div style="height:8px;border-radius:4px;background:#F5F5F7;width:60%"></div></div>'+
          '<div style="width:100%;padding:12px 0;border-radius:10px;background:#fff;color:#111111;font-size:12px;font-weight:700;text-align:center">'+v.good+'</div></div>';
      },
      renderBad: function(el) {
        el.innerHTML = '<div style="width:100%;height:100%;padding:20px;display:flex;flex-direction:column;justify-content:center;gap:10px;background:#F5F5F7">'+
          '<div style="font-size:11px;font-weight:700;color:#3A3A3F;text-align:center;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px">'+v.ctx+'</div>'+
          '<div style="display:flex;flex-direction:column;gap:6px;padding:12px 14px;background:#FFFFFF;border-radius:10px;border:1px solid #E8E8EC;margin-bottom:6px">'+
          '<div style="height:8px;border-radius:4px;background:#EBEBEF;width:80%"></div>'+
          '<div style="height:8px;border-radius:4px;background:#F5F5F7;width:60%"></div></div>'+
          '<div style="width:100%;padding:12px 0;border-radius:10px;background:#fff;color:#111111;font-size:12px;font-weight:700;text-align:center">'+v.bad+'</div></div>';
      }
    };
  }

  // GAME ENGINE
  var tiers = [
    [r1_typeHierarchy, r1_buttonIntent],
    [r2_primaryActionSide, r2_lineLength],
    [r3_loadingPattern, r3_emptyState],
    [r4_shadowSystem, r4_colorTemperature, r4_microCopy]
  ];
  var TOTAL=4, currentRound=0, score=0, activeRounds=[];
  function gi(id){ return document.getElementById(id); }
  var $cards=gi('game-cards'), $prompt=gi('game-prompt'), $title=gi('prompt-title'), $sub=gi('prompt-sub');
  var $round=gi('game-round'), $diff=gi('game-diff'), $att=gi('att-badge'), $progress=gi('progress-bar');
  var $dots=gi('game-score'), $results=gi('results'), $rScore=gi('results-score'), $rLabel=gi('results-label');
  var $rUnlock=gi('results-unlock'), $rCta=gi('results-cta'), $replay=gi('replay-btn');
  var $pwdLink=gi('pwd-link'), $pwdSec=gi('results-pwd-section'), $pwdInput=gi('results-pwd-input');
  var $pwdSubmit=gi('results-pwd-submit'), $pwdError=gi('results-pwd-error');

  function updateBadge() {
    if (!$att) return;
    var left=attemptsLeft();
    $att.textContent=left+' attempt'+(left===1?'':'s')+' remaining';
    $att.className='att-badge'+(left===1?' warn':'');
  }
  function generateRounds() { activeRounds=tiers.map(function(p){ return pick(p)(); }); }
  function initDots() {
    $dots.innerHTML='';
    for(var i=0;i<TOTAL;i++){var d=document.createElement('div');d.className='score-dot';$dots.appendChild(d);}
  }
  function renderRound() {
    var r=activeRounds[currentRound];
    $title.textContent=r.title; $sub.textContent=r.sub;
    $round.textContent=String(currentRound+1).padStart(2,'0')+' / '+String(TOTAL).padStart(2,'0');
    $diff.textContent=difficulties[currentRound];
    $diff.className='game-difficulty'+(currentRound>=2?' hard':'');
    $progress.style.width=(currentRound/TOTAL*100)+'%';
    $prompt.style.animation='none'; $cards.style.animation='none';
    void $prompt.offsetHeight;
    $prompt.style.opacity='0'; $prompt.style.transform='translateY(12px)';
    $prompt.style.animation='fadeUp 0.5s ease 0.05s forwards';
    $cards.style.opacity='0'; $cards.style.transform='translateY(16px)';
    $cards.style.animation='fadeUp 0.5s ease 0.15s forwards';
    var leftGood=Math.random()>0.5; $cards.innerHTML='';
    for(var i=0;i<2;i++){
      var card=document.createElement('div'); card.className='game-card';
      var lbl=document.createElement('div'); lbl.className='card-label'; lbl.textContent=i===0?'A':'B'; card.appendChild(lbl);
      var ui=document.createElement('div'); ui.className='card-ui'; card.appendChild(ui);
      var fb=document.createElement('div'); fb.className='card-feedback'; card.appendChild(fb);
      var isGood=(i===0&&leftGood)||(i===1&&!leftGood);
      if(isGood){r.renderGood(ui);fb.innerHTML='<strong>Correct.</strong> '+r.feedback;card.setAttribute('data-correct','true');}
      else{r.renderBad(ui);fb.innerHTML='<strong>Not quite.</strong> '+r.wrongFeedback;card.setAttribute('data-correct','false');}
      card.addEventListener('click',handlePick); $cards.appendChild(card);
    }
  }
  function handlePick(e) {
    var picked=e.currentTarget, isOK=picked.getAttribute('data-correct')==='true';
    var all=$cards.querySelectorAll('.game-card');
    all.forEach(function(c){c.classList.add('disabled');});
    if(isOK){score++;picked.classList.add('correct');all.forEach(function(c){if(c!==picked)c.classList.add('wrong');});}
    else{picked.classList.add('wrong');all.forEach(function(c){if(c.getAttribute('data-correct')==='true')c.classList.add('correct');});}
    var ds=$dots.querySelectorAll('.score-dot');
    if(ds[currentRound])ds[currentRound].classList.add(isOK?'hit':'miss');
    // Countdown bar
    var track=document.getElementById('countdown-track'), fill=document.getElementById('countdown-fill');
    if(track&&fill){fill.classList.remove('draining');void fill.offsetWidth;track.classList.add('visible');fill.classList.add('draining');}
    setTimeout(function(){
      if(track)track.classList.remove('visible');
      if(fill)fill.classList.remove('draining');
      currentRound++;if(currentRound<TOTAL)renderRound();else showResults();
    },10000);
  }
  var arrowSvg=' <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
  function fireConfetti() {
    if(typeof confetti === 'undefined') return;
    var end = Date.now() + 3000;
    var colors = ['#ffffff', '#0044E4', '#22c55e', '#facc15', '#818cf8'];
    (function frame() {
      confetti({ particleCount: 6, angle: 60, spread: 55, origin: { x: 0 }, colors: colors, startVelocity: 45, scalar: 1.1 });
      confetti({ particleCount: 6, angle: 120, spread: 55, origin: { x: 1 }, colors: colors, startVelocity: 45, scalar: 1.1 });
      if (Date.now() < end) requestAnimationFrame(frame);
    }());
    setTimeout(function() {
      confetti({ particleCount: 120, spread: 100, origin: { y: 0.55 }, colors: colors, startVelocity: 35, scalar: 1.2, gravity: 0.9 });
    }, 400);
  }

  function showResults() {
    $prompt.style.display='none'; $cards.style.display='none'; $progress.style.width='100%';
    $rScore.innerHTML=score+'<em>/'+TOTAL+'</em>';
    var perfect=score===TOTAL, hasReturn=returnTo&&returnTo!=='./', dest=hasReturn?returnTo:'./#work';
    var ctaLabel=hasReturn?'View case study':'View case studies';
    if(perfect){
      sessionStorage.setItem('jt_cs_unlocked','1');
      $rLabel.textContent='Clean sweep. You know what good looks like. Access granted.';
      $rUnlock.textContent='🔓 Case studies unlocked.'; $rUnlock.classList.remove('locked');
      $rCta.href=dest; $rCta.onclick=null; $rCta.classList.remove('locked'); $rCta.innerHTML=ctaLabel+arrowSvg;
      $replay.style.display='none'; $pwdLink.style.display='none';
      $results.classList.add('show');
      fireConfetti();
    } else {
      recordFail();
      if(isLockedOut()){
        $rLabel.textContent='That is both attempts used. Locked out for 1 hour.';
        $rUnlock.textContent='🔒 Come back in an hour. Or use the password.'; $rUnlock.classList.add('locked');
        $rCta.classList.add('locked'); $rCta.innerHTML='Locked'; $rCta.href='#';
        $replay.style.display='none'; $results.classList.add('show');
        setTimeout(showLockout,3500);
      } else {
        updateBadge(); var left=attemptsLeft();
        var warn=left===1?' Last attempt remaining.':'';
        if(score===TOTAL-1) $rLabel.textContent='One off. The last round is designed to trip people up.'+warn;
        else if(score>=2)   $rLabel.textContent='Solid in parts. The harder rounds are deliberately hard.'+warn;
        else                $rLabel.textContent='The first two rounds should have been yours. Go again.'+warn;
        $rUnlock.textContent='🔒 100% required.'+(left===1?' Last chance.':''); $rUnlock.classList.add('locked');
        $rCta.classList.add('locked'); $rCta.innerHTML='Try again'; $rCta.href='#';
        $rCta.onclick=function(e){e.preventDefault();resetGame();};
        $results.classList.add('show');
      }
    }
  }
  function resetGame() {
    if(attemptsLeft()<=0){showLockout();return;}
    currentRound=0;score=0; $results.classList.remove('show'); $pwdSec.classList.remove('show');
    $pwdLink.style.display=''; $replay.style.display=''; $pwdError.style.display='none'; $pwdInput.value='';
    $prompt.style.display=''; $cards.style.display=''; $progress.style.width='0%';
    generateRounds();initDots();renderRound();updateBadge();
  }
  $replay.addEventListener('click',function(){if(attemptsLeft()<=0){showLockout();return;}resetGame();});
  $pwdLink.addEventListener('click',function(){$pwdLink.style.display='none';$pwdSec.classList.add('show');$pwdInput.focus();});
  function checkPassword(){
    var val=$pwdInput.value.replace(/\s/g,'').toUpperCase();
    if(val==='OPENSAYSME'){sessionStorage.setItem('jt_cs_unlocked','1');window.location.href=(returnTo&&returnTo!=='./')?returnTo:'./#work';}
    else{$pwdError.style.display='block';$pwdInput.style.borderColor='var(--accent)';setTimeout(function(){$pwdInput.style.borderColor='';},1500);}
  }
  $pwdSubmit.addEventListener('click',checkPassword);
  $pwdInput.addEventListener('keydown',function(e){if(e.key==='Enter')checkPassword();});
  generateRounds();initDots();renderRound();updateBadge();
})();
</script>
