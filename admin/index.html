const esc = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;').replace(/'/g,'&#x27;');

const wc = t => t.split(/\s+/).filter(Boolean).length;
const rt = t => Math.max(1, Math.ceil(wc(t) / 150));

function fmtDate(iso) {
  const M = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const [y,m,d] = iso.split('-').map(Number);
  return `${M[m-1]} ${d}, ${y}`;
}

function excerpt(body, max=160) {
  const f = body.split('\n\n')[0].trim();
  if (f.length <= max) return f;
  const t = f.slice(0,max), ls = t.lastIndexOf(' ');
  return (ls>0 ? t.slice(0,ls) : t) + '...';
}

function toB64(str) {
  const bytes = new TextEncoder().encode(str);
  let b = '';
  for (const x of bytes) b += String.fromCharCode(x);
  return btoa(b);
}

function fromB64(b64) {
  const bin = atob(b64.replace(/\n/g,''));
  const bytes = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

function linkify(text) {
  const URL_RE = /(https?:\/\/\S+)/g;
  const parts = text.split(URL_RE);
  return parts.map((part, i) => {
    if (i % 2 === 0) return esc(part);
    const url = part.replace(/[.,;)]+$/, '');
    const trailing = esc(part.slice(url.length));
    return `<a href="${esc(url)}" target="_blank" rel="noopener" class="fc-link">${esc(url)}</a>${trailing}`;
  }).join('');
}

function bodyToHtml(body, headings) {
  headings = headings || new Set();
  const parts = [];
  let inFC = false;

  for (let para of body.split('\n\n')) {
    para = para.trim();
    if (!para || para === '---') continue;

    if (para === 'Fact Check') {
      inFC = true;
      parts.push('<div class="fact-check">');
      parts.push('<h2 class="fact-check-heading">Fact Check</h2>');
      continue;
    }
    if (inFC && para === 'Every factual claim in this article, with its source.') {
      parts.push(`<p class="fact-check-intro">${esc(para)}</p>`); continue;
    }

    if (inFC) {
      // Claim and Source may be on separate \n lines within the same \n\n block
      const lines = para.split('\n').map(l => l.trim()).filter(Boolean);
      for (const line of lines) {
        if (line.startsWith('Claim:'))
          parts.push(`<p class="fc-claim"><strong>Claim:</strong> ${esc(line.slice(6).trim())}</p>`);
        else if (line.startsWith('Source:'))
          parts.push(`<p class="fc-source">${linkify(line.slice(7).trim())}</p>`);
        else if (line.startsWith('Unsourced statements'))
          parts.push(`<p class="fc-unsourced">${esc(line)}</p>`);
        else
          parts.push(`<p class="fc-source">${esc(line)}</p>`);
      }
    } else {
      parts.push(headings.has(para) ? `<h2>${e}</h2>` : `<p>${e}</p>`);
    }
  }
  if (inFC) parts.push('</div>');
  return parts.join('\n    ');
}

// ─────────────────────────────────────────────────────────────────────────────
// GITHUB API
// ─────────────────────────────────────────────────────────────────────────────
async function ghGet(path) {
  const r = await fetch(`https://api.github.com/repos/${path}`, {
    headers: { Authorization: `Bearer ${tok}`, Accept: 'application/vnd.github.v3+json' }
  });
  if (!r.ok) throw new Error(`GET ${path} → ${r.status}`);
  return r.json();
}

async function ghPut(path, content, sha, msg) {
  const r = await fetch(`https://api.github.com/repos/${path}`, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${tok}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg, content: toB64(content), sha })
  });
  if (!r.ok) throw new Error(`PUT ${path} → ${r.status}: ${await r.text()}`);
  return r.json();
}

async function loadPosts() {
  const f = await ghGet('ruonalim/ruonalim-site/contents/public/posts.json');
  return { posts: JSON.parse(fromB64(f.content)), sha: f.sha };
}

// ─────────────────────────────────────────────────────────────────────────────
// VIEWS
// ─────────────────────────────────────────────────────────────────────────────
function setView(v) {
  const isLogin = v === 'login';
  document.getElementById('login-view').hidden = !isLogin;
  document.getElementById('app-view').hidden = isLogin;
  document.getElementById('app-nav').hidden = isLogin;
  document.getElementById('list-view').hidden = v !== 'list';
  document.getElementById('edit-view').hidden = v !== 'edit';
  document.getElementById('nav-back-btn').hidden = v !== 'edit';
  document.getElementById('nav-sub').textContent = v === 'edit' ? 'Edit article' : 'Articles';
}

function showList() {
  setView('list');
  renderList();
}

function renderList() {
  const el = document.getElementById('article-list');
  const cnt = document.getElementById('article-count');
  document.getElementById('loading').hidden = true;
  cnt.textContent = `${posts.length} articles`;

  const sorted = [...posts].sort((a,b) => b.date.localeCompare(a.date));
  el.innerHTML = sorted.map(p => {
    const m = META[p.id];
    const topic = m ? m.topic : (p.topic || '');
    return `<div class="article-row" onclick="showEdit('${p.id}')">
      <div class="article-row-body">
        <div class="article-row-title">${esc(p.title)}</div>
        <div class="article-row-meta">
          <span class="article-row-date">${p.date}</span>
          <span class="topic-chip">${esc(topic)}</span>
        </div>
      </div>
      <span class="article-row-cta">Edit →</span>
    </div>`;
  }).join('');
}

function showEdit(id) {
  currentId = id;
  const p = posts.find(x => x.id === id);
  if (!p) return;
  document.getElementById('edit-title').textContent = p.title;
  document.getElementById('edit-meta').textContent = `${p.date} · ${rt(p.body)} min read`;
  document.getElementById('body-editor').value = p.body;
  setStatus('', '');
  setView('edit');
  updateStats();
  document.getElementById('body-editor').scrollTop = 0;
}

function updateStats() {
  const v = document.getElementById('body-editor').value;
  document.getElementById('editor-stats').textContent = `${wc(v).toLocaleString()} words · ${rt(v)} min read`;
}

function setStatus(msg, cls) {
  const el = document.getElementById('save-status');
  el.textContent = msg;
  el.className = cls;
}

// ─────────────────────────────────────────────────────────────────────────────
// AUTH
// ─────────────────────────────────────────────────────────────────────────────
async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const input = document.getElementById('tok');
  const err = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  const pw = input.value;
  if (!pw) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Checking…';
  err.style.display = 'none';

  try {
    const h = await sha256hex(pw);
    if (h !== _PWD_HASH) throw new Error('wrong password');
    tok = _PAT;
    const res = await loadPosts();
    posts = res.posts;
    sessionStorage.setItem('jt-admin-auth', '1');
    input.value = '';
    showList();
  } catch(e) {
    err.style.display = 'block';
    tok = '';
    btn.disabled = false;
    btn.textContent = 'Continue →';
  }
}

function handleLogout() {
  sessionStorage.removeItem('jt-admin-auth');
  tok = ''; posts = [];
  document.getElementById('tok').value = '';
  setView('login');
}

// ─────────────────────────────────────────────────────────────────────────────
// SAVE
// ─────────────────────────────────────────────────────────────────────────────
async function doSave() {
  const btn = document.getElementById('save-btn');
  const newBody = document.getElementById('body-editor').value.trim();
  if (!newBody) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Saving…';
  setStatus('', '');

  try {
    const post = posts.find(p => p.id === currentId);
    const meta = META[currentId];
    if (!post || !meta) throw new Error('Article metadata not found');

    // Update in memory
    post.body = newBody;
    post.wordCount = wc(newBody);

    // 1 — Commit posts.json to ruonalim.com repo
    setStatus('Updating posts.json…', '');
    const postsFile = await ghGet('ruonalim/ruonalim-site/contents/public/posts.json');
    await ghPut(
      'ruonalim/ruonalim-site/contents/public/posts.json',
      JSON.stringify(posts, null, 2),
      postsFile.sha,
      `Update: ${post.title}`
    );

    // 2 — Generate + commit article HTML to jaytulloch.com repo
    setStatus('Regenerating article page…', '');
    const htmlFile = await ghGet(`ruonalim/jaytulloch.com/contents/writing/${meta.slug}.html`);
    const newHtml = genHTML(post, meta.slug, meta.topic);
    await ghPut(
      `ruonalim/jaytulloch.com/contents/writing/${meta.slug}.html`,
      newHtml,
      htmlFile.sha,
      `Update article: ${post.title}`
    );

    setStatus('Saved ✓  Both sites deploying now', 'ok');

  } catch(e) {
    setStatus(`Error: ${e.message}`, 'err');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save & publish';
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
(async () => {
  if (tok) {
    try {
      const res = await loadPosts();
      posts = res.posts;
      showList();
    } catch {
      sessionStorage.removeItem('jt-admin-tok');
      tok = '';
      setView('login');
    }
  } else {
    setView('login');
  }
  document.getElementById('tok').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
})();
</script>
